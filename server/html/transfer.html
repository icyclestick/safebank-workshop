<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank - Transfer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #12122a;
            border: 1px solid #1e1e3a;
            border-radius: 12px;
            padding: 2.5rem;
            width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h2 { color: #00d4ff; margin-bottom: 0.5rem; }
        .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .balance {
            background: #0a0a1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .balance .amount { font-size: 1.8rem; color: #00ff88; font-weight: 700; }
        .balance .label { font-size: 0.75rem; color: #666; }
        label { display: block; margin-bottom: 0.3rem; color: #aaa; font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 1rem;
            background: #0a0a1a;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.95rem;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border: none;
            border-radius: 6px;
            color: #0a0a1a;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 700;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <h2>💸 Transfer Funds</h2>
        <p class="subtitle">Send money to another account</p>
        <div class="balance">
            <div class="label">Available Balance</div>
            <div class="amount">$12,450.00</div>
        </div>
        <form action="/transfer" method="POST">
            <label>Recipient</label>
            <input type="text" name="to" value="user2" placeholder="Recipient username">
            <label>Amount ($)</label>
            <input type="number" name="amount" value="500" placeholder="0.00">
            <button type="submit">Send Transfer</button>
        </form>
    </div>
</body>
</html>
