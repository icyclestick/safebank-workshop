server {
    listen 80;
    server_name workshop.lab;

    root /usr/share/nginx/html;
    index index.html;

    # Login page
    location /login {
        default_type text/html;
        try_files /login.html =404;

        # Set an insecure session cookie on every response (simulates a login)
        add_header Set-Cookie "session_token=s3cr3t-t0k3n-abc123xyz; Path=/";
    }

    # Transfer endpoint - accepts POST, returns JSON
    location /transfer {
        if ($request_method = POST) {
            add_header Content-Type application/json;
            return 200 '{"status":"success","message":"Transfer of $500 completed","transaction_id":"TXN-98712"}';
        }

        # GET shows the transfer page
        default_type text/html;
        try_files /transfer.html =404;
    }

    # Default
    location / {
        try_files $uri $uri/ /index.html;
    }
}
