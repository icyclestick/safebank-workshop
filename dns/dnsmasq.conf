# DNS server configuration for the workshop lab
# Resolves workshop.lab -> the server container (10.0.0.20)

# Don't read /etc/resolv.conf
no-resolv

# Don't read /etc/hosts
no-hosts

# Listen on all interfaces
listen-address=0.0.0.0

# Custom DNS records for the lab
address=/workshop.lab/10.0.0.20

# Upstream DNS for anything else (Google DNS)
server=8.8.8.8

# Log all DNS queries (useful for participants to see)
log-queries
log-facility=-
